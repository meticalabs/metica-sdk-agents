# Feature MET-11567 (added in 2.4.2): `MeticaAds.RevenueCallbackDelivery = CallbackDelivery.NativeThread`
# delivers fullscreen (interstitial/rewarded) OnAdRevenuePaid synchronously on the native callback
# thread instead of posting it to the Unity main thread — which is paused while a fullscreen ad is
# shown, so a main-thread-posted callback is lost if the process dies first. Recommended for 2.4.2+:
# it keeps impression revenue (and any 3PA forwarder inside the handler) from being lost on
# app-closed-mid-ad. Trade-off: the handler then runs off the Unity main thread, so it must be
# thread-safe (no Unity-main-thread-only APIs). Banner/MRec revenue is unaffected (still main thread).
# validator's `threepa_forwarder_in_revenue_paid` rule checks for this on 2.4.2+ integrations.
# Known issue MET-11632 (fixed in 2.4.2): on SDK < 2.4.2, IL2CPP + managed stripping
# (Low/Medium/High) strips an anonymous type in the Android init bridge → JsonConvert emits
# "{}" → every user forced to HOLDOUT. compat-checker's `managed_stripping` check WARNs on this.
# Behavior change (2.4.2, Android): banner/MRec creation and display are now separate steps — the
# client must call `Create<Format>` (CreateBanner/CreateMrec) and then `Show<Format>` (ShowBanner/
# ShowMrec); a show/load issued with no preceding `Create` for the same adUnitId displays nothing.
# Canonical lifecycle: Create → Show (the SDK loads the ad and auto-refreshes; an explicit `Load` is
# only for manual refresh after StopAutoRefresh). The integrator's template generates Create → Show
# in Init<Format>; the validator's banner/MRec rules expect it.

# Type discipline:
#   *_min / *_max version fields are strings. Empty string = no bound.
#   java_min / android_api_min are integers (major version number).

# Dev-only artifacts (local .unitypackage paths) live in metica-versions.dev.yaml.
