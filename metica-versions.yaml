# Single source of truth for MeticaSDK version compatibility.
# Auto-updated by a workflow in the SDK source repo on every release.
# Read by: metica-unity-compat-checker, metica-unity-integrator, download-metica-sdk.sh.

schema: "metica-versions/1.0.0"

# The version selected when no explicit --version is passed.
latest: "2.4.0"

versions:
  "2.4.0":
    platforms: ["android"]
    unity_min: "2021.3"
    unity_max: ""           # empty string = no upper bound (consistent across *_max fields)
    java_min: 11
    java_max: ""
    max_min: "8.2.0"
    max_max: ""
    android_api_min: 23
    # Note: asset filename casing matches the real GitHub release artifact and intentionally
    # differs between versions (MeticaSdk-2.4.0 vs MeticaSDK-2.2.2). Do not "fix" it.
    download_url: "https://github.com/meticalabs/metica-unity-package/releases/download/v2.4.0/MeticaSdk-2.4.0.unitypackage"
    sha256: "8bea5e13a759949f98b961df6b4d730db16ab5e133a5a38fc942195e72fdf067"
    released_at: ""         # ISO date, fill on real release
    release_notes_url: ""
    deprecated: false

  "2.2.2":
    platforms: ["android"]
    unity_min: "2021.3"
    unity_max: ""
    java_min: 11
    java_max: ""
    max_min: "8.0.0"
    max_max: ""
    android_api_min: 23
    download_url: "https://github.com/meticalabs/metica-unity-package/releases/download/v2.2.2/MeticaSDK-2.2.2.unitypackage"
    sha256: "7fe8e4edea8066a3d8a8f0f9ad9ef2d66ee2243646c3df6a5a5d437f272343e6"
    released_at: ""
    release_notes_url: ""
    deprecated: false

# Type discipline:
#   *_min / *_max version fields are strings. Empty string = no bound.
#   java_min / android_api_min are integers (major version number).

# Dev-only artifacts (local .unitypackage paths) live in metica-versions.dev.yaml.
# That file is gitignored and loaded only when METICA_SDK_DEV=1.
